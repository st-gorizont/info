<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Builder</title>
</head>
<body>
  <h1>Page Builder</h1>
  <form id="pageForm">
    <input type="text" id="pageTitle" placeholder="Page Title">
    <input type="text" id="pageUrl" placeholder="Page URL">
    <div id="blocks"></div>
    <select id="blockType">
      <option value="">Add Block...</option>
      <option value="gallery">Gallery</option>
      <option value="text">Text</option>
      <option value="form">Form</option>
      <option value="social">Social Links</option>
    </select>
    <button type="button" id="addBlockBtn">Add Block</button>
    <button type="submit">Save Page</button>
    <button type="button" id="viewPageBtn">View Page</button>
    <button type="button" id="deletePageBtn" style="display:none;">Delete Page</button>
  </form>
  <script src="../js/data.js"></script>
  <script src="page-builder.js"></script>
</body>
</html>
