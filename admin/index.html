<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
</head>
<body>
  <div id="login">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button type="submit">Login</button>
    </form>
    <p id="loginError" style="color:red;display:none;">Invalid credentials</p>
  </div>
  <div id="editor" style="display:none;">
    <h1>Site Editor</h1>
    <section>
      <h2>Logo</h2>
      <form id="logoForm">
        <input type="text" id="logoUrl" placeholder="Logo URL">
        <button type="submit">Save Logo</button>
      </form>
    </section>
    <section>
      <h2>Menu</h2>
      <form id="menuForm"></form>
    </section>
    <section>
      <h2>Articles</h2>
      <form id="articlesForm"></form>
    </section>
  </div>
  <script src="../js/data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
