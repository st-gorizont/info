<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
</head>
<body>
  <div id="login">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button type="submit">Login</button>
    </form>
    <p id="loginError" style="color:red;display:none;">Invalid credentials</p>
  </div>
  <div id="editor" style="display:none;">
    <h1>Edit Menu</h1>
    <form id="menuForm">
      <div><input type="text" name="item0" placeholder="Item 1"></div>
      <div><input type="text" name="item1" placeholder="Item 2"></div>
      <div><input type="text" name="item2" placeholder="Item 3"></div>
      <div><input type="text" name="item3" placeholder="Item 4"></div>
      <button type="submit">Save</button>
    </form>
  </div>
  <script src="../js/menu.js"></script>
  <script src="admin.js"></script>
</body>
</html>
